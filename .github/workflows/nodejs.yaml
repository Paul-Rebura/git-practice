name: Node.js CI # 1. workflow

on: # 2. events
  push:
    branches: [ main ] # the action is triggered when is pushed on main branch
  pull_request:
    branches: [ main ] # the action is triggered when there is a pull on main branch

jobs: # 3. jobs
  build:
    runs-on: ubuntu-latest # 5. runner - uses the latest version of ubuntu to run the below steps

  steps: # 4. steps
    - uses: actions/checkout@v4 # it checks out the repository
    - uses: actions/setup-node@v4 # it sets up the Node.js environment
      with:
        node-version: '20.x' # it sets the Node.js version to 20.x
    - name: Set environment variables # it sets up the environment variables
      run: echo "NODE_ENV=test" >> $GITHUB_ENV # creates a file called "$GITHUB_ENV" with the content "NODE_ENV=test"
    - name: Prepare dependencies 
      run: | # runs 2 commands to installs packages from the package-lock. json file and it runs build if the build is installed
        npm ci  
        npm run build --if-present
    - name: Run all tests
      run: npm test # runs the tests
    - name: Archive test and code-coverage results
      uses: actions/upload-artifact@v4 # uses the upload artifact action to upload the test results
      if: ${{ always() }} # runs the action always, even if the tests fail
      with:
        name: test-and-code-coverage-report
        path: test-results.txt # the file where the results are uploaded 
